<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Job Postings — CITUHireX</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .job-post-card { cursor: pointer; }
    .job-post-card .title:hover { color: var(--maroon); }
  </style>
</head>
<body>
  <div class="dash-shell">
    <div id="sidebar-root"></div>
    <main class="main-content">
      <div class="topbar">
        <div>
          <h1>My Job Postings</h1>
          <p class="subtitle">Manage your OJT openings — click any posting to view, edit, or delete it</p>
        </div>
        <button class="btn btn-primary" id="toggle-form-btn">+ Post New Job</button>
      </div>

      <form id="new-job-form" class="card" style="display:none; margin-bottom:32px;">
        <h2 class="section-title">New Job Posting</h2>
        <div class="field">
          <label>Title</label>
          <input type="text" id="title" required placeholder="Software Engineering Intern" />
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="description" rows="4" required placeholder="What will the intern work on?"></textarea>
        </div>
        <div class="field">
          <label>Location</label>
          <p class="sub-meta" id="location-display" style="margin:0 0 4px;">Loading your company address…</p>
          <p class="sub-meta" style="margin:0; font-size:12px; color:var(--gray-500);">Synced from your <a href="profile.html" style="color:var(--maroon); font-size:12px; font-weight:600;">Company Profile</a> address — update it there if this changes.</p>
        </div>
        <div class="field">
          <label>Slots Available</label>
          <input type="number" id="slots" required value="1" min="1" />
        </div>
        <div class="field">
          <label>Eligible Programs (leave unselected for "open to all CEA")</label>
          <div id="eligible-programs" class="checkbox-list"></div>
        </div>
        <div class="field">
          <label>Required Skills — updates based on Eligible Programs selected above</label>
          <div id="required-skills" class="checkbox-list" style="max-height:260px;">
            <p class="sub-meta">Loading skills…</p>
          </div>
        </div>

        <p class="form-error" id="form-error" style="display:none;"></p>

        <div style="display:flex; gap:12px;">
          <button type="submit" class="btn btn-primary" id="submit-job-btn">Submit for Approval</button>
          <button type="button" class="btn btn-ghost" id="cancel-form-btn">Cancel</button>
        </div>
      </form>

      <div class="list-col" id="jobs-list">
        <p class="loading-text">Loading…</p>
      </div>
    </main>
  </div>

  <script type="module" src="../js/company-jobs.js"></script>
</body>
</html>
