<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — CITUHireX</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-brand hero-gradient">
      <div class="logo-row">
        <span class="logo-dot"></span>
        <span class="logo-text">CITUHireX</span>
      </div>
      <h1>One platform.<br />Three roles.<br />Zero manual tracking.</h1>
      <p>Coordinators get full visibility into every application, endorsement, and placement — replacing spreadsheets and Facebook groups with an auditable system.</p>
    </div>

    <div class="auth-form-panel">
      <div class="inner">
        <h2 style="font-size:30px; font-weight:800; margin:0 0 8px;">Welcome back</h2>
        <p style="color:var(--gray-700); margin:0 0 32px;">Log in to continue to your dashboard</p>

        <div class="role-tabs" id="role-tabs">
          <button class="role-tab active" data-role="student" type="button">Student</button>
          <button class="role-tab" data-role="company" type="button">Company</button>
          <button class="role-tab" data-role="coordinator" type="button">Coordinator</button>
        </div>

        <form id="login-form">
          <div class="field">
            <label id="email-label">School Email</label>
            <input type="email" id="email" required placeholder="yourname@cit.edu" />
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="password" required placeholder="••••••••" />
          </div>

          <p class="form-error" id="error-msg" style="display:none;"></p>

          <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;">
            Log In as Student
          </button>
        </form>

        <p style="margin-top:24px; font-size:14px; color:var(--gray-700);">
          Don't have an account? <a href="signup.html" style="font-weight:700; color:var(--maroon);">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
