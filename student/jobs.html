<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Jobs — CITUHireX</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .job-card { cursor: pointer; }
    .job-card .title:hover { color: var(--maroon); }
  </style>
</head>
<body>
  <div class="dash-shell">
    <div id="sidebar-root"></div>
    <main class="main-content">
      <div class="topbar">
        <div>
          <h1>Browse Jobs</h1>
          <p class="subtitle">Open OJT postings across CEA programs</p>
        </div>
      </div>

      <p class="form-error" id="error-msg" style="display:none;"></p>

      <h2 class="section-title" id="matched-heading" style="display:none;">Matched Jobs</h2>
      <p class="subtitle" id="matched-subtitle" style="display:none; margin-top:-12px; margin-bottom:16px;">Based on the skills listed on your profile</p>
      <div class="list-col" id="matched-jobs-list" style="margin-bottom:40px;"></div>

      <h2 class="section-title">Browse Jobs</h2>
      <div class="list-col" id="jobs-list">
        <p class="loading-text">Loading…</p>
      </div>
    </main>
  </div>

  <script type="module" src="../js/student-jobs.js"></script>
</body>
</html>
