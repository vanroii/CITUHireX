<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — CITUHireX</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="dash-shell">
    <div id="sidebar-root"></div>
    <main class="main-content" style="max-width: 640px;">
      <div class="topbar">
        <div>
          <h1>My Profile</h1>
          <p class="subtitle">Keep this current — companies see it when you apply</p>
        </div>
      </div>

      <div id="setup-banner" style="display:none;" class="form-note">
        Welcome! Finish setting up your profile below to unlock the rest of CITUHireX — you won't be
        able to reach the dashboard, job listings, or messages until this is complete.
      </div>

      <form id="profile-form" class="card">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="full-name" />
        </div>
        <div class="field">
          <label>Student Number</label>
          <input type="text" id="student-number" disabled />
        </div>
        <div class="field">
          <label>Program</label>
          <input type="text" id="program-name" disabled />
        </div>
        <div class="field">
          <label>Year Level</label>
          <select id="year-level">
            <option value="1">Year 1</option>
            <option value="2">Year 2</option>
            <option value="3">Year 3</option>
            <option value="4">Year 4</option>
            <option value="5">Year 5</option>
          </select>
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="text" id="phone" placeholder="+63 9XX XXX XXXX" />
        </div>
        <div class="field">
          <label>Preferred City / Municipality</label>
          <select id="preferred-city">
            <option value="">Select city/municipality</option>
          </select>
        </div>
        <div class="field">
          <label>Preferred Barangay</label>
          <select id="preferred-barangay" disabled>
            <option value="">Select city/municipality first</option>
          </select>
        </div>
        <div class="field">
          <label>Skills — standardized for your program</label>
          <div id="skills" class="checkbox-list" style="max-height:280px;">
            <p class="sub-meta">Loading skills…</p>
          </div>
        </div>

        <p class="form-error" id="error-msg" style="display:none;"></p>
        <p style="color:var(--success); font-size:14px; font-weight:600; display:none;" id="success-msg">Saved.</p>

        <button type="submit" class="btn btn-primary" id="save-btn">Save Changes</button>
      </form>
    </main>
  </div>

  <script type="module" src="../js/student-profile.js"></script>
</body>
</html>
