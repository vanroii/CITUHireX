<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — CITUHireX</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="dash-shell">
    <div id="sidebar-root"></div>
    <main class="main-content">
      <div class="topbar">
        <div>
          <h1 id="greeting">Welcome back</h1>
          <p class="subtitle" id="subtitle">Loading…</p>
        </div>
        <div class="avatar"></div>
      </div>

      <div class="stat-row" id="stat-row"></div>

      <h2 class="section-title">Open postings for your program</h2>
      <div class="list-col" id="open-jobs-list">
        <p class="loading-text">Loading…</p>
      </div>

      <h2 class="section-title" style="margin-top:40px;" id="applications-heading" style="display:none;">Your applications</h2>
      <div class="list-col" id="applications-list"></div>
    </main>
  </div>

  <script type="module" src="../js/student-dashboard.js"></script>
</body>
</html>
